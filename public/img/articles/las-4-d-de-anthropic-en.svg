<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="heroArrowEn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a4a34"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#F0EEE6"/>

  <text x="80" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#141413">Anthropic's 4 Ds</text>
  <text x="80" y="145" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#5C5A54">The AI Fluency framework</text>

  <!-- cross connectors -->
  <line x1="410" y1="385" x2="790" y2="385" stroke="#8a4a34" stroke-width="2.5" marker-start="url(#heroArrowEn)" marker-end="url(#heroArrowEn)"/>
  <line x1="600" y1="300" x2="600" y2="480" stroke="#8a4a34" stroke-width="2.5" marker-start="url(#heroArrowEn)" marker-end="url(#heroArrowEn)"/>

  <!-- diagonal connectors -->
  <path d="M295,350 Q380,290 470,270" fill="none" stroke="#8a4a34" stroke-width="2.5" marker-start="url(#heroArrowEn)" marker-end="url(#heroArrowEn)"/>
  <path d="M905,350 Q820,290 730,270" fill="none" stroke="#8a4a34" stroke-width="2.5" marker-start="url(#heroArrowEn)" marker-end="url(#heroArrowEn)"/>
  <path d="M295,420 Q380,480 470,510" fill="none" stroke="#8a4a34" stroke-width="2.5" marker-start="url(#heroArrowEn)" marker-end="url(#heroArrowEn)"/>
  <path d="M905,420 Q820,480 730,510" fill="none" stroke="#8a4a34" stroke-width="2.5" marker-start="url(#heroArrowEn)" marker-end="url(#heroArrowEn)"/>

  <!-- Delegation (top) -->
  <rect x="470" y="230" width="260" height="70" rx="10" fill="#CC785C"/>
  <text x="600" y="272" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Delegation</text>

  <!-- Delineation (left) -->
  <rect x="150" y="350" width="260" height="70" rx="10" fill="#CC785C"/>
  <text x="280" y="392" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Delineation</text>

  <!-- Discernment (right) -->
  <rect x="790" y="350" width="260" height="70" rx="10" fill="#CC785C"/>
  <text x="920" y="392" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Discernment</text>

  <!-- Diligence (bottom) -->
  <rect x="470" y="480" width="260" height="70" rx="10" fill="#CC785C"/>
  <text x="600" y="522" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Diligence</text>
</svg>
